version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tokensee_postgres
    environment:
      POSTGRES_USER: tokensee
      POSTGRES_PASSWORD: tokensee_dev_password
      POSTGRES_DB: tokensee
    ports:
      - '5432:5432'
    volumes:
      - tokensee_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tokensee']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tokensee_redis
    ports:
      - '6379:6379'
    volumes:
      - tokensee_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  tokensee_pgdata:
  tokensee_redisdata:
